name: Build Android APK (android-app)

on:
  push:
    branches:
      - android-app
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Restore signing keystore
        env:
          MCNOTES_KEYSTORE_B64: ${{ secrets.MCNOTES_KEYSTORE_B64 }}
        run: |
          if [ -z "$MCNOTES_KEYSTORE_B64" ]; then
            echo "Missing MCNOTES_KEYSTORE_B64 secret"
            exit 1
          fi
          mkdir -p android
          echo "$MCNOTES_KEYSTORE_B64" | base64 -d > android/McNotes-signing.keystore

      - name: Build signed APK
        env:
          MCNOTES_KEYSTORE_PATH: android/McNotes-signing.keystore
          MCNOTES_KEY_ALIAS: ${{ secrets.MCNOTES_KEY_ALIAS }}
          MCNOTES_KEYSTORE_PASS: ${{ secrets.MCNOTES_KEYSTORE_PASS }}
          MCNOTES_KEY_PASS: ${{ secrets.MCNOTES_KEY_PASS }}
        run: npm run android:build

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcnotes-android-apk
          path: resources/McNotes.apk
          if-no-files-found: error
