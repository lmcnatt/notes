services:
  mcnotes:
    image: ghcr.io/lmcnatt/notes:latest
    container_name: mcnotes
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      # A strong secret is auto-generated and persisted to the data volume on
      # first run. Set it explicitly to control it yourself (recommended).
      # JWT_SECRET: "change-me-to-a-long-random-string"
      #
      # Set to "true" to allow public self-registration from the start.
      # The very first account is always allowed and becomes the admin.
      ALLOW_REGISTRATION: "false"
    volumes:
      - mcnotes-data:/data

  # (Optional) Reverse proxy with automatic HTTPS.
  # Uncomment this service and set DOMAIN below to expose McNotes on the internet.
  # Requires your domain's DNS A record to point to this server's IP.
  # Caddy auto-renews HTTPS certificates and works on any platform.
  #
  # caddy:
  #   image: caddy:latest
  #   container_name: mcnotes-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   environment:
  #     # Set this to your domain (e.g., notes.example.com)
  #     DOMAIN: ${DOMAIN:-localhost}
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   depends_on:
  #     - mcnotes

volumes:
  mcnotes-data:
  # caddy-data:
  # caddy-config:
