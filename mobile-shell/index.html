<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>McNotes</title>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: #f4edd8;
        color: #30251a;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid rgba(48, 37, 26, 0.2);
        border-top-color: #30251a;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0;
      }
      p {
        margin: 0;
        opacity: 0.7;
        font-size: 0.95rem;
        max-width: 20rem;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner" role="status" aria-label="Connecting"></div>
    <h1>Connecting to McNotes…</h1>
    <p>If this screen persists, check your internet connection and try again.</p>
  </body>
</html>
